<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>yondiazz</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    /* ASAP de fondo */
		.background-text {
  position: fixed;
  top: 52%;
  left: 50%;
  transform: translate(-48%, -52%);
  
  font-size: 14vw;
  width: 100%;
  text-align: center;

  color: rgba(255, 255, 255, 0.2);
  letter-spacing: 20px;

  user-select: none;
  pointer-events: none;
  
  text-shadow: 0 0 20px rgba(255,255,255,0.3);
}
    }

    header {
      position: relative;
      padding: 600px 20px;
      z-index: 1;
    }

    h1 {
      font-size: 3em;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 600px;
		}

    p {
      font-size: 1.2em;
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      border: 2px solid white;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;

  padding: 15px;
  font-size: 0.9em;
  opacity: 0.6;

  text-align: center;
  background: transparent;
}
  </style>
</head>
<body>

  <div class="background-text">ASAP</div>


  <footer>
    © 2026 yondiazz - Todos los derechos reservados
  </footer>

</body>
</html>
